AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Homestead API. Single-table backend for tracking homestead animals,
  pastures, animal moves, lifecycle events, and feed purchases. One
  monolithic Lambda routed via Lambda Powertools event-handler behind a
  Cognito-authorized REST API, plus private S3 + CloudFront hosting for
  the dashboard UI.

Parameters:
  Environment:
    Type: String
    AllowedValues: [staging, production]
    Default: staging
    Description: Deployment environment. Drives per-env resource names and config.
  CognitoUserPoolArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /readysetcloud/auth/user-pool-arn
    Description: |
      SSM path resolving to the rsc-core Cognito user pool ARN. Resolved
      at deploy time because the API Gateway authorizer can't read SSM at
      runtime. Published by rsc-core.
  UserPoolId:
    Type: String
    Description: |
      Cognito user pool id (e.g. us-east-1_AbCdEfGhI). Used by the Lambda
      authorizer to verify dashboard id tokens via JWKS. Derivable from
      CognitoUserPoolArn, but CFN can't split an SSM-resolved value at
      deploy time, so the deploy workflows pass it directly.
  UserPoolClientId:
    Type: String
    Description: |
      Cognito app client id the dashboard uses. The Lambda authorizer
      validates that incoming id tokens were minted for this client (aud
      claim).
  BaseCustomDomain:
    Type: String
    Default: ""
    Description: |
      Optional apex/parent domain the dashboard lives under (e.g.
      readysetcloud.io). When set, the dashboard is served at
      homestead.<BaseCustomDomain>. Leave empty to serve from the
      autogenerated CloudFront hostname. HostedZoneId must be set
      alongside this; setting just one is a no-op.
  HostedZoneId:
    Type: String
    Default: ""
    Description: |
      Route53 hosted zone id for BaseCustomDomain. The stack creates the
      ACM certificate (DNS-validated in this zone) and the A record for
      homestead.<BaseCustomDomain>.
  AlexaSkillId:
    Type: String
    Default: ""
    Description: |
      Amazon Alexa skill id (amzn1.ask.skill.<uuid>) allowed to invoke the
      Alexa skill Lambda. When set, the AlexaSkill event restricts
      invocation to this skill via SkillId. Leave empty during the first
      deploy (before the skill exists in the Alexa console), then set it
      and redeploy to lock the trigger down.
  ApiAlarmEmail:
    Type: String
    Default: ""
    Description: |
      Optional email subscribed to the CloudWatch alarm SNS topic (API 5xx
      rate, authorizer failures, throttling). Leave empty to create the
      alarms and topic without a notification subscription.
  AlexaUserPoolClientId:
    Type: String
    Default: ""
    Description: |
      Optional Cognito app client id used by the Alexa skill's account
      linking. The Lambda authorizer additionally accepts ACCESS tokens
      minted for this client (Alexa account linking returns an access
      token, not an id token). Leave empty if the skill reuses the
      dashboard app client (UserPoolClientId).

# Combined condition so partial-set (one param without the other) is a
# no-op rather than a deploy error.
Conditions:
  HasBaseCustomDomain: !Not [!Equals [!Ref BaseCustomDomain, ""]]
  HasHostedZoneId: !Not [!Equals [!Ref HostedZoneId, ""]]
  DeployCustomDomain: !And
    - !Condition HasBaseCustomDomain
    - !Condition HasHostedZoneId
  # Skill-restrict the Alexa trigger only once an AlexaSkillId is supplied.
  HasAlexaSkillId: !Not [!Equals [!Ref AlexaSkillId, ""]]
  # Subscribe an email to the alarm topic only when one is provided.
  HasApiAlarmEmail: !Not [!Equals [!Ref ApiAlarmEmail, ""]]

Metadata:
  esbuild-properties: &esbuild-properties
    Format: esm
    Minify: true
    OutExtension:
      - .js=.mjs
    Target: es2022
    Sourcemap: false
    EntryPoints:
      - index.mjs
    Banner:
      - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
    External: []

Globals:
  Function:
    Architectures: [arm64]
    Tracing: Active
    Timeout: 15
    MemorySize: 512
    Runtime: nodejs22.x
    Environment:
      Variables:
        TABLE_NAME: !Ref HomesteadTable
        EVENT_BUS_NAME: default
        POWERTOOLS_SERVICE_NAME: homestead
        LOG_LEVEL: info
        ENVIRONMENT: !Ref Environment
        # Origin echoed back as Access-Control-Allow-Origin. Custom domain
        # when configured, else the dashboard CloudFront hostname. Kept in
        # sync with the API Gateway-level Cors block below.
        CORS_ALLOWED_ORIGIN: !If
          - DeployCustomDomain
          - !Sub "https://homestead.${BaseCustomDomain}"
          - !Sub "https://${DashboardDistribution.DomainName}"

Resources:
  HomesteadTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
        - AttributeName: gsi2pk
          AttributeType: S
        - AttributeName: gsi2sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        # GSI1 backs entity-scoped lookups: animals by species/status,
        # animals by pasture, lifecycle events by type+month, pastures by
        # name, feed purchases by type. Every read path is a Query (no
        # Scans anywhere). See docs/DATA_MODEL.md for the full map.
        - IndexName: GSI1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # GSI2 backs the global "all animals by status, newest first"
        # listing (gsi2pk = ANIMAL, gsi2sk = STATUS#<status>#<createdAt>#<id>)
        # so the herd view doesn't need a Scan.
        - IndexName: GSI2
          KeySchema:
            - AttributeName: gsi2pk
              KeyType: HASH
            - AttributeName: gsi2sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      # `expiresAt` powers TTL cleanup of any time-bounded records
      # (idempotency entries, ephemeral pointers).
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  HomesteadApi:
    Type: AWS::Serverless::Api
    Properties:
      TracingEnabled: true
      StageName: v1
      MethodSettings:
        - MetricsEnabled: True
          ResourcePath: "/*"
          HttpMethod: "*"
          LoggingLevel: INFO
          # Basic stage-level throttling. Personal-scale API: cap steady
          # request rate and burst so a runaway client (or the Alexa skill
          # in a loop) can't drive cost or hammer the backend.
          ThrottlingRateLimit: 20
          ThrottlingBurstLimit: 40
      # Lambda TOKEN authorizer verifying Cognito id tokens. Sets
      # requestContext.authorizer.{sub, email, authSource} for routes.
      Auth:
        DefaultAuthorizer: HomesteadAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          HomesteadAuthorizer:
            FunctionArn: !GetAtt ApiAuthorizerFunction.Arn
            Identity:
              Header: Authorization
              # No caching while the design settles -- revocation takes
              # effect on the next request. Revisit once call volume
              # justifies trading cache TTL for revocation latency.
              ReauthorizeEvery: 0
      Cors:
        AllowOrigin: !If
          - DeployCustomDomain
          - !Sub "'https://homestead.${BaseCustomDomain}'"
          - !Sub "'https://${DashboardDistribution.DomainName}'"
        AllowHeaders: "'authorization,content-type,idempotency-key'"
        AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"

  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - index.mjs
    Properties:
      CodeUri: api
      Handler: index.handler
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            # DynamoDB CRUD on the table + its indexes. No Scan anywhere.
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Query
                - dynamodb:BatchGetItem
                - dynamodb:BatchWriteItem
                - dynamodb:TransactWriteItems
                - dynamodb:ConditionCheckItem
              Resource:
                - !GetAtt HomesteadTable.Arn
                - !Sub "${HomesteadTable.Arn}/index/*"
            # EventBridge: publish domain events to the default bus.
            - Effect: Allow
              Action:
                - events:PutEvents
              Resource:
                - !Sub "arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/default"
      Events:
        ProxyAny:
          Type: Api
          Properties:
            RestApiId: !Ref HomesteadApi
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: Api
          Properties:
            RestApiId: !Ref HomesteadApi
            Path: /
            Method: ANY

  # Custom Lambda authorizer verifying Cognito id tokens. Lives in the
  # same api/ CodeUri as the main router but has its own esbuild entry
  # point so it doesn't pull in the route/domain bundle.
  ApiAuthorizerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - authorizer.mjs
    Properties:
      CodeUri: api
      Handler: authorizer.handler
      MemorySize: 512
      Timeout: 10
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPoolId
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
          ALEXA_CLIENT_ID: !Ref AlexaUserPoolClientId
      Policies:
        - AWSLambdaBasicExecutionRole

  # Alexa skill backend. Its own CodeUri (alexa/) and esbuild entry point so
  # it ships ask-sdk-core without pulling in the API route/domain bundle. The
  # AlexaSkill event makes Alexa the only invoker; when an AlexaSkillId is
  # supplied the trigger is further restricted to that single skill. The
  # skill calls the API over HTTPS using the account-linked user's token
  # (see docs/ALEXA.md), so it needs no DynamoDB/EventBridge permissions.
  AlexaSkillFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - index.mjs
    Properties:
      CodeUri: alexa
      Handler: index.handler
      Environment:
        Variables:
          # Base URL of the Homestead REST API the skill calls. Mirrors the
          # ApiBaseUrl output: custom domain when configured, else the
          # autogenerated execute-api hostname with the /v1 stage path.
          API_BASE_URL: !If
            - DeployCustomDomain
            - !Sub "https://api.homestead.${BaseCustomDomain}"
            - !Sub "https://${HomesteadApi}.execute-api.${AWS::Region}.amazonaws.com/v1"
      Events:
        AlexaTrigger:
          Type: AlexaSkill
          Properties:
            SkillId: !If [HasAlexaSkillId, !Ref AlexaSkillId, !Ref "AWS::NoValue"]
      Policies:
        - AWSLambdaBasicExecutionRole

  # --- Observability / hardening ----------------------------------------
  # SNS topic alarms publish to. An email subscription is added only when
  # ApiAlarmEmail is supplied.
  ApiAlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "homestead-api-alarms-${Environment}"

  ApiAlarmEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasApiAlarmEmail
    Properties:
      TopicArn: !Ref ApiAlarmTopic
      Protocol: email
      Endpoint: !Ref ApiAlarmEmail

  # API Gateway 5xx rate: fires when the API returns server errors. Uses the
  # AWS/ApiGateway 5XXError metric scoped to this REST API + stage.
  Api5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "homestead-api-5xx-${Environment}"
      AlarmDescription: API Gateway is returning 5xx server errors.
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: !Ref HomesteadApi
        - Name: Stage
          Value: v1
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref ApiAlarmTopic
      OKActions:
        - !Ref ApiAlarmTopic

  # Authorizer failures: a sustained spike of 401s from API Gateway usually
  # means the Cognito authorizer is rejecting tokens (misconfig or outage)
  # rather than ordinary unauthenticated callers.
  ApiAuthFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "homestead-api-authorizer-failures-${Environment}"
      AlarmDescription: Elevated 401 Unauthorized responses from the API authorizer.
      Namespace: AWS/ApiGateway
      MetricName: 4XXError
      Dimensions:
        - Name: ApiName
          Value: !Ref HomesteadApi
        - Name: Stage
          Value: v1
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 25
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref ApiAlarmTopic
      OKActions:
        - !Ref ApiAlarmTopic

  # Alexa skill Lambda errors: surfaces failures in the voice path
  # (unhandled exceptions, API client errors that escape the handlers).
  AlexaSkillErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "homestead-alexa-errors-${Environment}"
      AlarmDescription: The Alexa skill Lambda is erroring.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref AlexaSkillFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref ApiAlarmTopic

  # Static hosting for the dashboard UI. Bucket is private; only the
  # CloudFront distribution (via OAC) can read it. SPA routing rewrites
  # 403/404 to /index.html so deep links survive a refresh. CI builds
  # ui/, syncs the output here, and invalidates the distribution.
  DashboardBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "homestead-dashboard-${Environment}-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  DashboardOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-${Environment}-dashboard-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Baseline security headers applied to every dashboard response.
  DashboardResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${AWS::StackName}-${Environment}-dashboard-headers"
        SecurityHeadersConfig:
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 63072000
            IncludeSubdomains: true
            Preload: true
            Override: true

  DashboardDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${AWS::StackName} dashboard (${Environment})"
        DefaultRootObject: index.html
        HttpVersion: http2
        IPV6Enabled: true
        # PriceClass_100 keeps cost down (US/EU edges only).
        PriceClass: PriceClass_100
        Aliases: !If
          - DeployCustomDomain
          - [!Sub "homestead.${BaseCustomDomain}"]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - DeployCustomDomain
          - AcmCertificateArn: !Ref DashboardCertificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: dashboard-origin
            DomainName: !GetAtt DashboardBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt DashboardOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: dashboard-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          # CachingOptimized -- AWS managed cache policy id.
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref DashboardResponseHeadersPolicy
        CustomErrorResponses:
          # SPA routing -- OAC + private bucket returns 403 for missing
          # keys (not 404), so we rewrite both to /index.html.
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

  DashboardBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DashboardBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOACRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${DashboardBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${DashboardDistribution}"

  # ACM cert for the dashboard's custom domain. CloudFront requires the
  # cert in us-east-1; the stack lives there too. DNS validation
  # auto-creates the validation CNAMEs in the supplied hosted zone.
  DashboardCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: DeployCustomDomain
    Properties:
      DomainName: !Sub "homestead.${BaseCustomDomain}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub "homestead.${BaseCustomDomain}"
          HostedZoneId: !Ref HostedZoneId

  # Z2FDTNDATAQYW2 is the CloudFront alias hosted zone -- constant for
  # every distribution per AWS docs.
  DashboardDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: DeployCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "homestead.${BaseCustomDomain}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt DashboardDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

Outputs:
  ApiBaseUrl:
    Description: |
      Base URL for the Homestead REST API. Custom domain
      (api.homestead.<BaseCustomDomain>) when set, otherwise the
      autogenerated execute-api hostname with the /v1 stage path.
    Value: !If
      - DeployCustomDomain
      - !Sub "https://api.homestead.${BaseCustomDomain}"
      - !Sub "https://${HomesteadApi}.execute-api.${AWS::Region}.amazonaws.com/v1"

  TableName:
    Description: DynamoDB single-table for Homestead
    Value: !Ref HomesteadTable

  AlexaSkillFunctionArn:
    Description: |
      ARN of the Alexa skill Lambda. Use this as the skill's default
      endpoint in the Alexa developer console.
    Value: !GetAtt AlexaSkillFunction.Arn

  ApiAlarmTopicArn:
    Description: SNS topic CloudWatch API/Alexa alarms publish to.
    Value: !Ref ApiAlarmTopic

  DashboardBucketName:
    Description: S3 bucket holding the dashboard static bundle
    Value: !Ref DashboardBucket

  DashboardDistributionId:
    Description: CloudFront distribution id (used by the deploy workflow for invalidations)
    Value: !Ref DashboardDistribution

  DashboardUrl:
    Description: URL the dashboard is served at
    Value: !If
      - DeployCustomDomain
      - !Sub "https://homestead.${BaseCustomDomain}"
      - !Sub "https://${DashboardDistribution.DomainName}"
