AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Homestead API. Single-table backend for tracking homestead animals,
  pastures, animal moves, lifecycle events, and feed purchases. One
  monolithic Lambda routed via Lambda Powertools event-handler behind a
  Cognito-authorized REST API, plus private S3 + CloudFront hosting for
  the dashboard UI.

Parameters:
  Environment:
    Type: String
    AllowedValues: [staging, production]
    Default: staging
    Description: Deployment environment. Drives per-env resource names and config.
  CognitoUserPoolArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /readysetcloud/auth/user-pool-arn
    Description: |
      SSM path resolving to the rsc-core Cognito user pool ARN. Resolved
      at deploy time because the API Gateway authorizer can't read SSM at
      runtime. Published by rsc-core.
  UserPoolId:
    Type: String
    Description: |
      Cognito user pool id (e.g. us-east-1_AbCdEfGhI). Used by the Lambda
      authorizer to verify dashboard id tokens via JWKS. Derivable from
      CognitoUserPoolArn, but CFN can't split an SSM-resolved value at
      deploy time, so the deploy workflows pass it directly.
  UserPoolClientId:
    Type: String
    Description: |
      Cognito app client id the dashboard uses. The Lambda authorizer
      validates that incoming id tokens were minted for this client (aud
      claim).
  BaseCustomDomain:
    Type: String
    Default: ""
    Description: |
      Optional apex/parent domain the homestead app lives under (e.g.
      readysetcloud.io). When set, the dashboard is served at
      farm.<BaseCustomDomain> and the REST API at farm.<BaseCustomDomain>/api
      (one CloudFront distribution fronts both). Leave empty to serve from
      the autogenerated CloudFront hostname. HostedZoneId must be set
      alongside this; setting just one is a no-op.
  HostedZoneId:
    Type: String
    Default: ""
    Description: |
      Route53 hosted zone id for BaseCustomDomain. The stack creates the
      ACM certificate (DNS-validated in this zone) and the A/AAAA records
      for farm.<BaseCustomDomain>.
  AlexaSkillId:
    Type: String
    Default: ""
    Description: |
      Amazon Alexa skill id (amzn1.ask.skill.<uuid>) allowed to invoke the
      Alexa skill Lambda. When set, the AlexaSkill event restricts
      invocation to this skill via SkillId. Leave empty during the first
      deploy (before the skill exists in the Alexa console), then set it
      and redeploy to lock the trigger down.
  BedrockModelId:
    Type: String
    Default: "us.amazon.nova-pro-v1:0"
    Description: |
      Amazon Bedrock model id (or cross-region inference profile id) the Alexa
      skill's AI-agent fallback invokes via the Converse API. Defaults to the
      US Amazon Nova Pro inference profile. Nova Pro model access must be
      enabled in the Bedrock console for the deploy region (see docs/ALEXA.md).
  AlexaUserPoolClientId:
    Type: String
    Default: ""
    Description: |
      Optional Cognito app client id used by the Alexa skill's account
      linking. The Lambda authorizer additionally accepts ACCESS tokens
      minted for this client (Alexa account linking returns an access
      token, not an id token). Leave empty if the skill reuses the
      dashboard app client (UserPoolClientId).
  StoreEggPricePerDozen:
    Type: String
    Default: "4.00"
    Description: |
      Default store price per dozen eggs used by the egg cost-per-dozen
      analytics (GET /stats/egg-cost, /stats/summary). Surfaced to the API
      Lambda as STORE_EGG_PRICE_PER_DOZEN; a per-request storePricePerDozen
      query param overrides it.
  DigestSenderEmail:
    Type: String
    Default: ""
    Description: |
      Optional verified SES "from" address for the scheduled weekly digest
      email. When both DigestSenderEmail and DigestRecipientEmail are set the
      DigestFunction emails the digest; otherwise it logs it. The digest event
      (HomesteadDigest) is always published regardless.
  DigestRecipientEmail:
    Type: String
    Default: ""
    Description: |
      Optional "to" address for the scheduled weekly digest email. See
      DigestSenderEmail.
  DigestSchedule:
    Type: String
    Default: "cron(0 18 ? * SUN *)"
    Description: |
      Schedule expression for the weekly digest function. Defaults to Sundays
      at 18:00 UTC. Override to change cadence.
  MilkPricePerGallon:
    Type: String
    Default: "8.00"
    Description: |
      Default market price per gallon of milk used by the milk cost-per-gallon
      analytics (GET /stats/milk-cost) and the milk output valuation in the P&L
      (GET /stats/pnl). Surfaced to the API Lambda as MILK_PRICE_PER_GALLON; a
      per-request milkPricePerGallon query param overrides it.
  MeatPricePerLb:
    Type: String
    Default: "6.00"
    Description: |
      Default market price per pound of dressed meat used by the meat output
      valuation in the P&L (GET /stats/pnl). Surfaced to the API Lambda as
      MEAT_PRICE_PER_LB; a per-request meatPricePerLb query param overrides it.
  LowFeedAlertDays:
    Type: String
    Default: "7"
    Description: |
      Days-remaining threshold below which a feed type triggers a low-feed
      alert in the scheduled AlertsFunction. Surfaced as LOW_FEED_ALERT_DAYS.
  HomesteadLatitude:
    Type: String
    Default: ""
    Description: |
      Optional homestead latitude. When both HomesteadLatitude and
      HomesteadLongitude are set the AlertsFunction fetches a daily open-meteo
      forecast and adds frost (<2C) / heat (>32C) alerts. Leave empty to skip
      the weather block entirely.
  HomesteadLongitude:
    Type: String
    Default: ""
    Description: |
      Optional homestead longitude. See HomesteadLatitude.
  AlertSchedule:
    Type: String
    Default: "cron(0 13 * * ? *)"
    Description: |
      Schedule expression for the daily homestead alerts function. Defaults to
      13:00 UTC daily. Override to change cadence.
  GrnApiBaseUrl:
    Type: String
    Default: ""
    Description: |
      Base URL of the Good Roots Network (GRN) API the garden pillar integrates
      with (e.g. https://api.goodroots.example). Surfaced to the API + Alerts
      Lambdas as GRN_API_BASE_URL. Leave empty to disable the GRN integration:
      the /grn/* proxy endpoints then return 503 (GrnNotConfigured), the
      GRN-sourced garden stats / produce value degrade to empty, and the daily
      claim-status sync is skipped. See docs/GRN.md.
  GrnApiTokenSsmPath:
    Type: String
    Default: "/homestead/grn/token"
    Description: |
      SSM SecureString parameter path holding the GRN API bearer token. Read at
      runtime (GetParameter WithDecryption) and cached ~5 minutes so rotating
      the token in SSM takes effect without a redeploy. Surfaced as
      GRN_API_TOKEN_SSM_PATH. The token only needs to exist when GrnApiBaseUrl
      is set. See docs/GRN.md.
  ProducePricePerLb:
    Type: String
    Default: "0"
    Description: |
      Default market price per pound of garden produce used by the produce
      output valuation in the P&L (GET /stats/pnl -> outputs.produceValue =
      GRN-sourced harvest amount x this price). Surfaced as PRODUCE_PRICE_PER_LB;
      a per-request producePricePerLb query param overrides it. Defaults to 0 so
      produceValue is 0 (and degrades to 0 when GRN is unconfigured) and prior
      P&L behavior is preserved until a price is configured.

# Combined condition so partial-set (one param without the other) is a
# no-op rather than a deploy error.
Conditions:
  HasBaseCustomDomain: !Not [!Equals [!Ref BaseCustomDomain, ""]]
  HasHostedZoneId: !Not [!Equals [!Ref HostedZoneId, ""]]
  DeployCustomDomain: !And
    - !Condition HasBaseCustomDomain
    - !Condition HasHostedZoneId
  # Skill-restrict the Alexa trigger only once an AlexaSkillId is supplied.
  HasAlexaSkillId: !Not [!Equals [!Ref AlexaSkillId, ""]]

Metadata:
  esbuild-properties: &esbuild-properties
    Format: esm
    Minify: true
    OutExtension:
      - .js=.mjs
    Target: es2022
    Sourcemap: false
    EntryPoints:
      - index.mjs
    Banner:
      - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url);
    External: []

Globals:
  Function:
    Architectures: [arm64]
    Tracing: Active
    Timeout: 15
    MemorySize: 512
    Runtime: nodejs22.x
    Environment:
      Variables:
        TABLE_NAME: !Ref HomesteadTable
        EVENT_BUS_NAME: default
        POWERTOOLS_SERVICE_NAME: homestead
        LOG_LEVEL: info
        ENVIRONMENT: !Ref Environment
        # Origin echoed back as Access-Control-Allow-Origin. The dashboard is
        # served same-origin with /api through the one CloudFront
        # distribution, so this only matters for direct cross-origin callers:
        # the custom domain when configured, else "*" (a literal -- the
        # distribution can't be referenced here without a circular dependency,
        # since the distribution now fronts the API). Kept in sync with the
        # API Gateway-level Cors block below.
        CORS_ALLOWED_ORIGIN: !If
          - DeployCustomDomain
          - !Sub "https://farm.${BaseCustomDomain}"
          - "*"

Resources:
  HomesteadTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
        - AttributeName: gsi2pk
          AttributeType: S
        - AttributeName: gsi2sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        # GSI1 backs entity-scoped lookups: animals by species/status,
        # animals by pasture, lifecycle events by type+month, pastures by
        # name, feed purchases by type. Every read path is a Query (no
        # Scans anywhere). See docs/DATA_MODEL.md for the full map.
        - IndexName: GSI1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # GSI2 backs the global "all animals by status, newest first"
        # listing (gsi2pk = ANIMAL, gsi2sk = STATUS#<status>#<createdAt>#<id>)
        # so the herd view doesn't need a Scan.
        - IndexName: GSI2
          KeySchema:
            - AttributeName: gsi2pk
              KeyType: HASH
            - AttributeName: gsi2sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      # `expiresAt` powers TTL cleanup of any time-bounded records
      # (idempotency entries, ephemeral pointers).
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  HomesteadApi:
    Type: AWS::Serverless::Api
    Properties:
      TracingEnabled: true
      StageName: v1
      MethodSettings:
        - MetricsEnabled: True
          ResourcePath: "/*"
          HttpMethod: "*"
          LoggingLevel: INFO
          # Basic stage-level throttling. Personal-scale API: cap steady
          # request rate and burst so a runaway client (or the Alexa skill
          # in a loop) can't drive cost or hammer the backend.
          ThrottlingRateLimit: 20
          ThrottlingBurstLimit: 40
      # Lambda TOKEN authorizer verifying Cognito id tokens. Sets
      # requestContext.authorizer.{sub, email, authSource} for routes.
      Auth:
        DefaultAuthorizer: HomesteadAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          HomesteadAuthorizer:
            FunctionArn: !GetAtt ApiAuthorizerFunction.Arn
            Identity:
              Header: Authorization
              # No caching while the design settles -- revocation takes
              # effect on the next request. Revisit once call volume
              # justifies trading cache TTL for revocation latency.
              ReauthorizeEvery: 0
      Cors:
        AllowOrigin: !If
          - DeployCustomDomain
          - !Sub "'https://farm.${BaseCustomDomain}'"
          # Same-origin via CloudFront; "*" only affects direct cross-origin
          # callers. Can't reference the distribution here (circular dep).
          - "'*'"
        AllowHeaders: "'authorization,content-type,idempotency-key'"
        AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"

  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - index.mjs
    Properties:
      CodeUri: api
      Handler: index.handler
      Environment:
        Variables:
          # Default store egg price per dozen for the cost-per-dozen
          # analytics; a storePricePerDozen query param overrides it.
          STORE_EGG_PRICE_PER_DOZEN: !Ref StoreEggPricePerDozen
          # Default output prices for the milk cost + P&L analytics; per-request
          # query params override them.
          MILK_PRICE_PER_GALLON: !Ref MilkPricePerGallon
          MEAT_PRICE_PER_LB: !Ref MeatPricePerLb
          # Default produce price per lb for the P&L produce tie-in (0 = off).
          PRODUCE_PRICE_PER_LB: !Ref ProducePricePerLb
          # Good Roots Network (GRN) two-way integration config. Base URL +
          # SSM path to the bearer token. Empty base URL disables the
          # integration (endpoints 503). GRN calls use default Lambda
          # networking (internet egress, no VPC).
          GRN_API_BASE_URL: !Ref GrnApiBaseUrl
          GRN_API_TOKEN_SSM_PATH: !Ref GrnApiTokenSsmPath
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            # DynamoDB CRUD on the table + its indexes. No Scan anywhere.
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Query
                - dynamodb:BatchGetItem
                - dynamodb:BatchWriteItem
                - dynamodb:TransactWriteItems
                - dynamodb:ConditionCheckItem
              Resource:
                - !GetAtt HomesteadTable.Arn
                - !Sub "${HomesteadTable.Arn}/index/*"
            # EventBridge: publish domain events to the default bus.
            - Effect: Allow
              Action:
                - events:PutEvents
              Resource:
                - !Sub "arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/default"
            # SSM: read the GRN bearer token (SecureString) from the configured
            # path. WithDecryption requires kms:Decrypt; scoped to the SSM
            # service so the default aws/ssm key (or a CMK SSM uses) can unwrap
            # the SecureString.
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GrnApiTokenSsmPath}"
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: "*"
              Condition:
                StringEquals:
                  "kms:ViaService": !Sub "ssm.${AWS::Region}.amazonaws.com"
      Events:
        ProxyAny:
          Type: Api
          Properties:
            RestApiId: !Ref HomesteadApi
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: Api
          Properties:
            RestApiId: !Ref HomesteadApi
            Path: /
            Method: ANY

  # Custom Lambda authorizer verifying Cognito id tokens. Lives in the
  # same api/ CodeUri as the main router but has its own esbuild entry
  # point so it doesn't pull in the route/domain bundle.
  ApiAuthorizerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - authorizer.mjs
    Properties:
      CodeUri: api
      Handler: authorizer.handler
      MemorySize: 512
      Timeout: 10
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPoolId
          USER_POOL_CLIENT_ID: !Ref UserPoolClientId
          ALEXA_CLIENT_ID: !Ref AlexaUserPoolClientId
      Policies:
        - AWSLambdaBasicExecutionRole

  # Scheduled weekly digest. Shares the api/ CodeUri but has its own esbuild
  # entry point (digest.mjs) so it doesn't pull in the full route bundle. On
  # its schedule it composes the weekly digest, always publishes a
  # HomesteadDigest event, and (when DIGEST_SENDER + DIGEST_RECIPIENT are set)
  # emails it via SES. Needs DynamoDB read on the table/indexes (the stats
  # aggregations it composes), events:PutEvents, and ses:SendEmail.
  DigestFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - digest.mjs
    Properties:
      CodeUri: api
      Handler: digest.handler
      Environment:
        Variables:
          DIGEST_SENDER: !Ref DigestSenderEmail
          DIGEST_RECIPIENT: !Ref DigestRecipientEmail
          STORE_EGG_PRICE_PER_DOZEN: !Ref StoreEggPricePerDozen
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            # DynamoDB read on the table + its indexes (read-only stats). No
            # Scan anywhere.
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:BatchGetItem
              Resource:
                - !GetAtt HomesteadTable.Arn
                - !Sub "${HomesteadTable.Arn}/index/*"
            # EventBridge: publish the HomesteadDigest event to the default bus.
            - Effect: Allow
              Action:
                - events:PutEvents
              Resource:
                - !Sub "arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/default"
            # SES: send the digest email when configured.
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        WeeklySchedule:
          Type: Schedule
          Properties:
            Schedule: !Ref DigestSchedule

  # Scheduled daily homestead alerts. Shares the api/ CodeUri but has its own
  # esbuild entry point (alerts.mjs) so it doesn't pull in the full route
  # bundle. On its schedule it composes alerts (low feed, care tasks due,
  # upcoming hatches + breedings, optional open-meteo frost/heat), always
  # publishes a HomesteadAlert event, and (when DIGEST_SENDER + DIGEST_RECIPIENT
  # are set) emails them via SES. The optional weather fetch needs internet
  # egress; the function runs on default Lambda networking (no VPC) so it has
  # outbound access. Needs DynamoDB read, events:PutEvents, and ses:SendEmail.
  AlertsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - alerts.mjs
    Properties:
      CodeUri: api
      Handler: alerts.handler
      Environment:
        Variables:
          DIGEST_SENDER: !Ref DigestSenderEmail
          DIGEST_RECIPIENT: !Ref DigestRecipientEmail
          LOW_FEED_ALERT_DAYS: !Ref LowFeedAlertDays
          HOMESTEAD_LATITUDE: !Ref HomesteadLatitude
          HOMESTEAD_LONGITUDE: !Ref HomesteadLongitude
          # GRN config: the daily claim-status sync calls
          # GET /my/listings?status=claimed and emits GrnListingClaimed per
          # claimed listing (no local store). Best-effort -- empty base URL
          # skips the sync. Uses default Lambda networking for egress.
          GRN_API_BASE_URL: !Ref GrnApiBaseUrl
          GRN_API_TOKEN_SSM_PATH: !Ref GrnApiTokenSsmPath
      Policies:
        - AWSLambdaBasicExecutionRole
        - Version: 2012-10-17
          Statement:
            # DynamoDB read + update on the table/indexes for the daily alert
            # aggregations (feed inventory, care tasks, breedings, hatches). No
            # Scan anywhere. The GRN claim-status sync keeps no local state.
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:BatchGetItem
                - dynamodb:UpdateItem
              Resource:
                - !GetAtt HomesteadTable.Arn
                - !Sub "${HomesteadTable.Arn}/index/*"
            # EventBridge: publish the HomesteadAlert + GrnListingClaimed events.
            - Effect: Allow
              Action:
                - events:PutEvents
              Resource:
                - !Sub "arn:${AWS::Partition}:events:${AWS::Region}:${AWS::AccountId}:event-bus/default"
            # SES: send the alert email when configured.
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
            # SSM: read the GRN bearer token (SecureString) for the claim-status
            # sync, plus KMS decrypt scoped to the SSM service.
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GrnApiTokenSsmPath}"
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: "*"
              Condition:
                StringEquals:
                  "kms:ViaService": !Sub "ssm.${AWS::Region}.amazonaws.com"
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: !Ref AlertSchedule

  # Alexa skill backend. Its own CodeUri (alexa/) and esbuild entry point so
  # it ships ask-sdk-core without pulling in the API route/domain bundle. The
  # AlexaSkill event makes Alexa the only invoker; when an AlexaSkillId is
  # supplied the trigger is further restricted to that single skill. The
  # skill calls the API over HTTPS using the account-linked user's token
  # (see docs/ALEXA.md), so it needs no DynamoDB/EventBridge permissions.
  AlexaSkillFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        <<: *esbuild-properties
        EntryPoints:
          - index.mjs
    Properties:
      CodeUri: alexa
      Handler: index.handler
      Environment:
        Variables:
          # Base URL of the Homestead REST API the skill calls. Mirrors the
          # ApiBaseUrl output: the CloudFront custom domain at /api when
          # configured, else the autogenerated execute-api hostname with the
          # /v1 stage path.
          API_BASE_URL: !If
            - DeployCustomDomain
            - !Sub "https://farm.${BaseCustomDomain}/api"
            - !Sub "https://${HomesteadApi}.execute-api.${AWS::Region}.amazonaws.com/v1"
          # Bedrock model id (or inference profile) the AI-agent fallback uses
          # when no structured intent matches the user's phrase.
          BEDROCK_MODEL_ID: !Ref BedrockModelId
      Events:
        AlexaTrigger:
          Type: AlexaSkill
          Properties:
            SkillId: !If [HasAlexaSkillId, !Ref AlexaSkillId, !Ref "AWS::NoValue"]
      Policies:
        - AWSLambdaBasicExecutionRole
        # The AI-agent fallback invokes Amazon Nova Pro via the Bedrock Converse
        # API. Scoped to the Nova Pro foundation model plus the cross-region
        # inference profile (us.* / eu.* / apac.*) the model id resolves through.
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource:
                - !Sub "arn:${AWS::Partition}:bedrock:*::foundation-model/amazon.nova-pro-v1:0"
                - !Sub "arn:${AWS::Partition}:bedrock:*:${AWS::AccountId}:inference-profile/*amazon.nova-pro-v1:0"

  # Static hosting for the dashboard UI. Bucket is private; only the
  # CloudFront distribution (via OAC) can read it. The SpaRewriteFunction
  # maps extensionless deep links to /index.html so they survive a refresh.
  # CI builds ui/, syncs the output here, and invalidates the distribution.
  DashboardBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "homestead-dashboard-${Environment}-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  DashboardOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-${Environment}-dashboard-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Baseline security headers applied to every dashboard response.
  DashboardResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub "${AWS::StackName}-${Environment}-dashboard-headers"
        SecurityHeadersConfig:
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 63072000
            IncludeSubdomains: true
            Preload: true
            Override: true

  DashboardDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${AWS::StackName} dashboard (${Environment})"
        DefaultRootObject: index.html
        HttpVersion: http2
        IPV6Enabled: true
        # PriceClass_100 keeps cost down (US/EU edges only).
        PriceClass: PriceClass_100
        Aliases: !If
          - DeployCustomDomain
          - [!Sub "farm.${BaseCustomDomain}"]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - DeployCustomDomain
          - AcmCertificateArn: !Ref DashboardCertificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: dashboard-origin
            DomainName: !GetAtt DashboardBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt DashboardOAC.Id
          # The REST API, fronted at <host>/api. OriginPath bakes in the
          # `v1` stage; the ApiPrefixStrip function removes the leading
          # `/api` so the origin sees the bare route (e.g. /eggs -> v1/eggs).
          - Id: api-origin
            DomainName: !Sub "${HomesteadApi}.execute-api.${AWS::Region}.amazonaws.com"
            OriginPath: /v1
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
        DefaultCacheBehavior:
          TargetOriginId: dashboard-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          # CachingOptimized -- AWS managed cache policy id.
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref DashboardResponseHeadersPolicy
          # SPA routing via function (not distribution-wide error rewrites,
          # which would also hijack the API's own 403/404 responses on the
          # /api/* behavior below). Extensionless paths -> /index.html.
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt SpaRewriteFunction.FunctionMetadata.FunctionARN
        CacheBehaviors:
          # <host>/api/* -> REST API. No caching; forward everything except
          # Host (execute-api needs its own host) so Authorization + bodies
          # reach the Lambda authorizer and routes intact.
          - PathPattern: /api/*
            TargetOriginId: api-origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
            Compress: true
            # CachingDisabled + AllViewerExceptHostHeader -- AWS managed ids.
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt ApiPrefixStripFunction.FunctionMetadata.FunctionARN

  # Rewrites extensionless viewer paths (SPA client routes like /garden) to
  # /index.html so the private S3 origin serves the app shell. Replaces the
  # old 403/404->index.html error responses, which were distribution-wide
  # and would have masked the API's own 403/404s on the /api/* behavior.
  SpaRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${AWS::StackName}-spa-rewrite"
      AutoPublish: true
      FunctionConfig:
        Comment: SPA fallback to /index.html for extensionless paths
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;
          var lastSegment = uri.substring(uri.lastIndexOf('/') + 1);
          if (uri !== '/' && lastSegment.indexOf('.') === -1) {
            request.uri = '/index.html';
          }
          return request;
        }

  # Strips the leading /api before the request reaches the API Gateway
  # origin (whose OriginPath already supplies the /v1 stage).
  ApiPrefixStripFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${AWS::StackName}-api-prefix-strip"
      AutoPublish: true
      FunctionConfig:
        Comment: Remove the /api path prefix for the REST API origin
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;
          if (uri === '/api' || uri === '/api/') {
            request.uri = '/';
          } else if (uri.startsWith('/api/')) {
            request.uri = uri.substring(4);
          }
          return request;
        }

  DashboardBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DashboardBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOACRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${DashboardBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${DashboardDistribution}"

  # ACM cert for the dashboard's custom domain. CloudFront requires the
  # cert in us-east-1; the stack lives there too. DNS validation
  # auto-creates the validation CNAMEs in the supplied hosted zone.
  DashboardCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: DeployCustomDomain
    Properties:
      DomainName: !Sub "farm.${BaseCustomDomain}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub "farm.${BaseCustomDomain}"
          HostedZoneId: !Ref HostedZoneId

  # Z2FDTNDATAQYW2 is the CloudFront alias hosted zone -- constant for
  # every distribution per AWS docs.
  DashboardDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: DeployCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "farm.${BaseCustomDomain}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt DashboardDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

  # AAAA companion so the dashboard resolves over IPv6 (distribution has
  # IPV6Enabled). Same CloudFront alias target.
  DashboardDnsRecordIpv6:
    Type: AWS::Route53::RecordSet
    Condition: DeployCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "farm.${BaseCustomDomain}"
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt DashboardDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

Outputs:
  ApiBaseUrl:
    Description: |
      Base URL for the Homestead REST API. The CloudFront custom domain at
      /api (https://farm.<BaseCustomDomain>/api) when set, otherwise the
      autogenerated execute-api hostname with the /v1 stage path.
    Value: !If
      - DeployCustomDomain
      - !Sub "https://farm.${BaseCustomDomain}/api"
      - !Sub "https://${HomesteadApi}.execute-api.${AWS::Region}.amazonaws.com/v1"

  TableName:
    Description: DynamoDB single-table for Homestead
    Value: !Ref HomesteadTable

  AlexaSkillFunctionArn:
    Description: |
      ARN of the Alexa skill Lambda. Use this as the skill's default
      endpoint in the Alexa developer console.
    Value: !GetAtt AlexaSkillFunction.Arn

  DashboardBucketName:
    Description: S3 bucket holding the dashboard static bundle
    Value: !Ref DashboardBucket

  DashboardDistributionId:
    Description: CloudFront distribution id (used by the deploy workflow for invalidations)
    Value: !Ref DashboardDistribution

  DashboardUrl:
    Description: URL the dashboard is served at
    Value: !If
      - DeployCustomDomain
      - !Sub "https://farm.${BaseCustomDomain}"
      - !Sub "https://${DashboardDistribution.DomainName}"
