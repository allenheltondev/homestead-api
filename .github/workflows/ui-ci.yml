name: UI CI

on:
  pull_request:
    paths:
      - 'ui/**'
      - '.github/workflows/ui-ci.yml'
  push:
    branches: [main]
    paths:
      - 'ui/**'
      - '.github/workflows/ui-ci.yml'

concurrency:
  group: ui-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Lint
        working-directory: ui
        run: npm run lint

      - name: Build
        working-directory: ui
        run: npm run build
